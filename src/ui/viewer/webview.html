<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <title>Android Device Viewer</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: var(--vscode-editor-background);
      --panel: var(--vscode-sideBar-background);
      --text: var(--vscode-foreground);
      --muted: var(--vscode-descriptionForeground);
      --accent: var(--vscode-button-background);
      --border: var(--vscode-widget-border, transparent);
      --error: var(--vscode-errorForeground);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--vscode-font-family);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .viewer-shell {
      max-width: 560px;
      padding: 24px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    .title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 600;
    }

    .body {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .status {
      margin-top: 14px;
      font-size: 12px;
      color: var(--error);
    }
  </style>
</head>
<body>
  <main class="viewer-shell">
    <h1 class="title">Android Device Viewer</h1>
    <p class="body">
      Placeholder shell for loading, disconnected, and error states.
      The live frame stream is rendered by the viewer panel controller.
    </p>
    <div class="status">Disconnected</div>
  </main>
</body>
</html>
